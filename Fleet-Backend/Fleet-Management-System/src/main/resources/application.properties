# application.properties
spring.application.name=fleet-management-system
server.port=8081
# Week 2 Configuration
osrm.api.url=http://router.project-osrm.org

# Set to true for development, false for production with real OSRM API
osrm.use.mock=true

# Increase timeout for external API calls
spring.webflux.client.max-connections=100
# MySQL Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/fleet_management?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=google
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Fix: Use the correct dialect for Spring Boot 4.x / Hibernate 7.x
# The MySQL8Dialect has been renamed
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# OR try this if above doesn't work:
# spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# Alternative: Let Hibernate auto-detect the dialect
# Comment out the dialect line and let it auto-detect
spring.jpa.database=mysql

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Connection pool settings
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000